services:
  postgres:
    image: postgres:16-alpine
    container_name: bluearc-os-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bluearc
      POSTGRES_PASSWORD: bluearc
      POSTGRES_DB: bluearc_os
    ports:
      - "5432:5432"
    volumes:
      - bluearc-os-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bluearc -d bluearc_os"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bluearc-os-postgres:
